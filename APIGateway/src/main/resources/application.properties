spring.application.name=APIGateway
server.port=8080

management.endpoints.web.exposure.include=*
management.endpoint.gateway.access=unrestricted

logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.web=DEBUG

spring.cloud.gateway.server.webflux.routes[0].id=solar
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/solar/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/solar/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[1].id=wind
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/wind/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/wind/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[2].id=battery
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/battery/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/battery/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[3].id=distribution
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/distribution/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/distribution/(?<segment>.*), /${segment}